spring:
  application:
    name: mar-sem-lixo-api
  threads:
    virtual:
      enabled: true
  profiles:
    default: dev
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/marsemlixo}
    username: ${SPRING_DATASOURCE_USERNAME:marsemlixo}
    password: ${SPRING_DATASOURCE_PASSWORD:marsemlixo}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    locations: classpath:db/migration
    fail-on-missing-locations: true
    baseline-on-migrate: false

app:
  auth:
    enabled: ${APP_AUTH_ENABLED:false}

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.marsemlixo: DEBUG
    org.springframework.web: INFO

management:
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    com.marsemlixo: INFO
    org.springframework: WARN

management:
  endpoint:
    health:
      show-details: never
